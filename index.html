<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Love Puzzle 💖</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            font-family: 'Comic Sans MS', sans-serif;
        }

        body {
            height: 100vh;

            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,
                    #ffd6e7,
                    #ffeaa7,
                    #dff9fb);

            position: relative;
        }

        /* FALLING HEARTS */

        .heart {
            position: absolute;

            top: -20px;

            color: red;

            animation: fall linear infinite;

            user-select: none;

            z-index: 1;
        }

        @keyframes fall {

            0% {
                transform: translateY(-10vh);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* MAIN CONTAINER */

        .container {
            width: 90%;
            max-width: 750px;

            background: rgba(255, 255, 255, 0.92);

            border-radius: 35px;

            padding: 30px;

            text-align: center;

            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.3);

            z-index: 2;
        }

        /* GIF */

        .gif {
            width: 120px;

            margin-bottom: 25px;
        }

        /* SECOND PART */

        .target {
            display: flex;
            justify-content: center;
            gap: 15px;

            margin-bottom: 60px;

            flex-wrap: wrap;
        }

        /* SHADOW WORD BOX */

        .slot {
            width: 130px;
            height: 70px;

            border: 3px dashed #ff9ff3;

            border-radius: 20px;

            background: rgba(255, 255, 255, 0.7);

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 1.6rem;
            font-weight: bold;

            position: relative;

            overflow: hidden;

            transition: 0.3s;
        }

        /* SHADOW WORD */

        .slot::before {
            content: attr(data-word);

            position: absolute;

            color: rgba(255, 105, 180, 0.18);

            font-size: 1.6rem;
            font-weight: bold;

            z-index: 1;
        }

        /* FILLED WORD */

        .slot span {
            position: relative;

            z-index: 2;

            color: #ff6b81;
        }

        /* THIRD PART */

        .words {
            display: flex;
            justify-content: center;
            gap: 20px;

            flex-wrap: wrap;
        }

        .word {
            padding: 14px 26px;

            background: linear-gradient(135deg,
                    #ff9ff3,
                    #feca57);

            border-radius: 25px;

            color: white;

            font-size: 1.2rem;
            font-weight: bold;

            cursor: grab;

            user-select: none;

            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);

            transition: 0.3s;
        }

        .word:hover {
            transform: scale(1.08);
        }

        .dragging {
            opacity: 0.5;
        }

        /* FINAL PAGE */

        .final-box {
            display: none;

            animation: fadeIn 1s ease;
        }

        .final-photo {
            width: 100%;
            max-width: 350px;

            border-radius: 25px;

            border: 5px solid white;

            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
        }

        .final-text {
            margin-top: 20px;

            font-size: 2rem;
            font-weight: bold;

            color: #ff6b81;
        }

        /* RESET HEART */

        .reset-heart {
            font-size: 3rem;

            margin-top: 25px;

            cursor: pointer;

            animation: pulse 1.2s infinite;

            transition: 0.3s;
        }

        .reset-heart:hover {
            transform: scale(1.2);
        }

        @keyframes pulse {

            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* MOBILE */

        @media(max-width:768px) {

            .container {
                padding: 20px;
            }

            .gif {
                width: 90px;
            }

            .slot {
                width: 90px;
                height: 50px;

                font-size: 1rem;
            }

            .slot::before {
                font-size: 1rem;
            }

            .word {
                font-size: 0.9rem;
                padding: 10px 18px;
            }

            .final-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <!-- FALLING HEARTS -->

    <script>

        for (let i = 0; i < 40; i++) {

            const heart =
                document.createElement("div");

            heart.classList.add("heart");

            heart.innerHTML = "❤️";

            heart.style.left =
                Math.random() * 100 + "vw";

            heart.style.fontSize =
                Math.random() * 18 + 10 + "px";

            heart.style.animationDuration =
                Math.random() * 5 + 5 + "s";

            heart.style.animationDelay =
                Math.random() * 5 + "s";

            document.body.appendChild(heart);
        }

    </script>

    <!-- MAIN -->

    <div class="container">

        <!-- GAME PAGE -->

        <div id="gamePage">

            <!-- GIF -->
            <img src="gif.gif" class="gif" alt="Cute Gif">

            <!-- SECOND PART -->

            <div class="target">

                <div class="slot" data-word="I"></div>

                <div class="slot" data-word="LOVE"></div>

                <div class="slot" data-word="YOU"></div>

            </div>

            <!-- THIRD PART -->

            <div class="words">

                <div class="word" draggable="true">
                    LOVE
                </div>

                <div class="word" draggable="true">
                    YOU
                </div>

                <div class="word" draggable="true">
                    I
                </div>

            </div>

        </div>

        <!-- FINAL PAGE -->

        <div class="final-box" id="finalPage">

            <!-- PHOTO -->
            <img src="3.jpg" class="final-photo" alt="Love Photo">

            <!-- TEXT -->
            <div class="final-text">
                💖 You Are My Destiny 💖
            </div>

            <!-- RESET -->
            <div class="reset-heart" onclick="resetGame()">
                ❤️
            </div>

        </div>

    </div>

    <script>

        const words =
            document.querySelectorAll(".word");

        const slots =
            document.querySelectorAll(".slot");

        let draggedWord = null;

        let correctCount = 0;

        /* DRAG */

        words.forEach(word => {

            word.addEventListener("dragstart", () => {

                draggedWord = word;

                word.classList.add("dragging");
            });

            word.addEventListener("dragend", () => {

                word.classList.remove("dragging");
            });

        });

        /* DROP */

        slots.forEach(slot => {

            slot.addEventListener("dragover", e => {

                e.preventDefault();
            });

            slot.addEventListener("drop", () => {

                if (
                    draggedWord.innerHTML.trim() ===
                    slot.dataset.word &&
                    slot.innerHTML === ""
                ) {

                    /* PUT WORD */

                    slot.innerHTML =
                        `<span>${draggedWord.innerHTML}</span>`;

                    slot.style.border =
                        "3px solid #ff6b81";

                    slot.style.background =
                        "#fff0f6";

                    /* REMOVE WORD BELOW */

                    draggedWord.remove();

                    correctCount++;

                    /* FINISH */

                    if (correctCount === 3) {

                        setTimeout(() => {

                            document.getElementById(
                                "gamePage"
                            ).style.display = "none";

                            document.getElementById(
                                "finalPage"
                            ).style.display = "block";

                        }, 800);
                    }
                }

            });

        });

        /* RESET GAME */

        function resetGame() {

            location.reload();
        }

    </script>

</body>

</html>
